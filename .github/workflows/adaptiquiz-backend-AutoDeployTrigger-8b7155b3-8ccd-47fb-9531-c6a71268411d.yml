name: Trigger auto deployment for adaptiquiz-backend

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/adaptiquiz-backend-AutoDeployTrigger-8b7155b3-8ccd-47fb-9531-c6a71268411d.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ADAPTIQUIZBACKEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.ADAPTIQUIZBACKEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.ADAPTIQUIZBACKEND_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: ghcr.io
          registryUsername: ${{ secrets.ADAPTIQUIZBACKEND_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.ADAPTIQUIZBACKEND_REGISTRY_PASSWORD }}
          containerAppName: adaptiquiz-backend
          resourceGroup: adaptiquiz-rg
          imageToBuild: ghcr.io/adaptiquiz-backend:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


