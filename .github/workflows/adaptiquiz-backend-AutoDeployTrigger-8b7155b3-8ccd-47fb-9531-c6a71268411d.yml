name: Trigger auto deployment for adaptiquiz-backend

on:
  push:
    branches:
      [ main ]
    paths:
    - 'backend/**'
    - '.github/workflows/adaptiquiz-backend-AutoDeployTrigger-8b7155b3-8ccd-47fb-9531-c6a71268411d.yml'

  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ADAPTIQUIZBACKEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.ADAPTIQUIZBACKEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.ADAPTIQUIZBACKEND_AZURE_SUBSCRIPTION_ID }}

      - name: Set lowercase owner
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/backend
          dockerfilePath: Dockerfile
          registryUrl: ghcr.io
          registryUsername: ${{ github.repository_owner }}
          registryPassword: ${{ secrets.GITHUB_TOKEN }}
          containerAppName: adaptiquiz-backend
          resourceGroup: adaptiquiz-rg
          imageToBuild: ghcr.io/${{ env.OWNER }}/adaptiquiz-backend:${{ github.sha }}
          environmentVariables: >
            GITHUB_TOKEN=${{ secrets.ADAPTIQUIZ_GITHUB_TOKEN }}
            ENV=azure
            FRONTEND_URL=${{ secrets.ADAPTIQUIZ_FRONTEND_URL }}
            COSMOS_ENDPOINT=${{ secrets.ADAPTIQUIZ_COSMOS_ENDPOINT }}
            COSMOS_KEY=${{ secrets.ADAPTIQUIZ_COSMOS_KEY }}
            DISABLE_SSL_VERIFY=false
